<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaika | Dish Details</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- CSS Link -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .detail-section {
            padding: 8rem 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .detail-container {
            display: flex;
            gap: 4rem;
            align-items: center;
            background: var(--bg-darker);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .detail-img-wrapper {
            flex: 1;
            height: 100%;
            min-height: 500px;
        }
        .detail-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .detail-content {
            flex: 1;
            padding: 3rem;
        }
        .detail-price {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-family: var(--font-heading);
        }
        .detail-title {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-family: var(--font-heading);
        }
        .detail-desc {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 2rem;
            line-height: 1.8;
        }
        .detail-ingredients {
            list-style: none;
            margin-bottom: 2rem;
        }
        .detail-ingredients li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }
        .detail-ingredients li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--primary-color);
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--primary-color);
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-btn:hover {
            opacity: 0.7;
            transform: translateX(-5px);
        }
        @media (max-width: 900px) {
            .detail-container {
                flex-direction: column;
            }
            .detail-img-wrapper {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html#home" class="logo">Zaika</a>
            <ul class="nav-menu">
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="index.html#menu" class="nav-link">Menu</a></li>
            </ul>
        </div>
    </nav>

    <!-- Detail Section -->
    <section class="detail-section" id="detail-section">
        <div class="container reveal">
            <a href="index.html#menu" class="back-btn">← Back to Menu</a>
            <div class="detail-container">
                <div class="detail-img-wrapper">
                    <img id="detail-img" src="" alt="Dish Image">
                </div>
                <div class="detail-content">
                    <div class="detail-price" id="detail-price">₹0</div>
                    <h1 class="detail-title" id="detail-title">Loading...</h1>
                    <p class="detail-desc" id="detail-desc">Please wait while the exquisite details of this dish are being fetched for you.</p>
                    
                    <h3 style="margin-bottom: 1rem; color: var(--text-light); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">Key Ingredients</h3>
                    <ul class="detail-ingredients" id="detail-ingredients">
                        <!-- Filled by JS -->
                    </ul>
                    
                    <button class="btn btn-primary" onclick="alert('Item added to your royal order!')">Order Now</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-container text-center">
            <p>&copy; 2026 Zaika Indian Fine Dining. Designed for Frontend Project.</p>
        </div>
    </footer>

    <script src="js/menu-details.js"></script>
</body>
</html>
